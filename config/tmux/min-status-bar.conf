set -g status-position bottom
set -g status-left-length 100
set -g status-right-length 100

set -g status-style "fg=lightblue,bg=default"
set -g status-left "#{?client_prefix,#[fg=red] ,#[fg=green] } "
set -g status-right "#[fg=cyan]#{session_name}"

set -g window-status-current-format "#[fg=blue,bold]#I:#W"
set -g window-status-format "#[fg=white]#I:#W"

set -g message-style "fg=lightblue,bg=default"
set -g mode-style "fg=black,bg=lightblue,bold"

set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=cyan"
